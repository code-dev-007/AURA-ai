<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AURA AI v2.0</title>
</head>

<body style="
    font-family: Segoe UI, sans-serif;
    background: #0a0d14;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 16px;
    text-align: center;
">

    <!-- Logo -->
    <div style="font-size: 60px;">🎓</div>

    <!-- Title -->
    <h1 style="
        color: #7c6df0;
        font-size: 28px;
    ">
        AURA AI v2.0
    </h1>

    <!-- Subtitle -->
    <p style="
        color: #718096;
        font-size: 14px;
    ">
        AI-Powered Exam Proctoring System
    </p>

    <!-- Tech Stack -->
    <p style="
        color: #4a5568;
        font-size: 12px;
    ">
        DSA: Trie • Deque • Graph+BFS • Max-Heap • Sliding Window • Hash Map
    </p>

    <!-- Navigation Buttons -->
    <div style="
        display: flex;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
        justify-content: center;
    ">

        <a href="/student" style="
            background: #7c6df0;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        ">
            🎓 Student Portal
        </a>

        <a href="/admin" style="
            background: #1a1d27;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid #2d3748;
        ">
            🛡️ Admin Dashboard
        </a>

        <a href="/docs" style="
            background: #1a1d27;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid #2d3748;
        ">
            📖 API Docs
        </a>

    </div>

    <!-- Footer Info -->
    <div style="
        margin-top: 20px;
        background: #1a1d27;
        border: 1px solid #2d3748;
        border-radius: 12px;
        padding: 16px 24px;
        font-size: 12px;
        color: #718096;
    ">
        5 Exam Types: General Aptitude • DSA &amp; Algorithms • Python Coding • Mathematics • Computer Science
    </div>

</body>
</html>
